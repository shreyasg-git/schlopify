apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  namespace: schlopify-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-api
  template:
    metadata:
      labels:
        app: platform-api
    spec:
      serviceAccountName: platform-api
      containers:
        - name: api
          image: platform-api:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: MINIKUBE_IP
              value: "192.168.49.2"
            - name: FRONTEND_IMAGE_TAG
              value: "v5"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service.auth-system.svc.cluster.local"
---
apiVersion: v1
kind: Service
metadata:
  name: platform-api
  namespace: schlopify-platform
spec:
  selector:
    app: platform-api
  ports:
    - protocol: TCP
      port: 8090
      targetPort: 8090
