apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: elk
data:
  filebeat.yml: |
    filebeat.inputs:
      - type: container
        paths:
          - /var/log/containers/*.log
        exclude_files: ['.gz$']
        processors:
          - add_kubernetes_metadata:
              host: ${NODE_NAME}
              matchers:
                - logs_path:
                    logs_path: "/var/log/containers"
    output.logstash:
      hosts: ["logstash.elk.svc.cluster.local:5044"]
    setup.kibana:
      host: "http://kibana.elk.svc.cluster.local:5601"
