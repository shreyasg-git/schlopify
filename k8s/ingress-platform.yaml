# ── Ingress 1: Platform API — /api routes to the control plane ───────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress-api
  namespace: schlopify-platform
spec:
  ingressClassName: nginx
  rules:
    - host: schlopify.192.168.49.2.nip.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: platform-api
                port:
                  number: 8090
---
# ── Ingress 2: Platform Frontend — everything else serves the SPA ────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: schlopify-platform
spec:
  ingressClassName: nginx
  rules:
    - host: schlopify.192.168.49.2.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-frontend
                port:
                  number: 80
