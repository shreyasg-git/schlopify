server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Auth requests are handled by the shared auth service.
    location /auth/ {
        proxy_pass http://auth-service.auth-system.svc.cluster.local;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backward-compatible path for older built assets that called /api/auth/*.
    location /api/auth/ {
        proxy_pass http://auth-service.auth-system.svc.cluster.local;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Direct service/port-forward access should still reach the platform API.
    location /api/ {
        proxy_pass http://platform-api.schlopify-platform.svc.cluster.local:8090/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # All other requests → React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
